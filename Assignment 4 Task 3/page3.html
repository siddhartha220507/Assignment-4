<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet"/>
</head>
<body>
    <div class="dashboard">
        <div class="sidebar">
            <span>Podcast</span>
            <span>Portfolio</span>
            <span>Research</span>
            <span>Clients</span>
        </div>

        <div class="profile-section">
            <div class="about-badge">
                <i class="ri-focus-3-line"></i> About Me
            </div>
            <div class="avatar-circle"></div>
            <div class="profile-info">
                <h1>Im,<br>Jon<br>Daniel</h1>
                <p>inquiry@jondaniel.design <i class="ri-mail-line"></i></p>
            </div>
            <div class="spin-badge"></div>
        </div>

        <div class="portfolio-grid">
            <div class="grid-header">
                <h1>Portfolio <span class="corner-mark"></span></h1>
            </div>
            
            <div class="grid-hero">
                <div class="play-button">
                    <i class="ri-play-fill"></i>
                </div>
            </div>

            <div class="grid-stats">
                <div class="stat-box top-stat">
                    <h2>251</h2>
                    <p>Projects</p>
                </div>
                <div class="stat-box bottom-stat">
                    <h2>156</h2>
                    <p>Awards</p>
                </div>
            </div>

            <div class="grid-clients">
                <i class="ri-apple-fill"></i>
                <p>Clients</p>
            </div>

            <div class="grid-awards">
                <div class="award-image"></div>
                <div class="award-info">
                    <h2>172</h2>
                    <p>Global Design Awards.</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
